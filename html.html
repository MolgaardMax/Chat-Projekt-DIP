<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a class="logo" href="/">💬 ChatServer</a>
    <nav class="header-nav">
      <span id="user-display" style="font-size:14px;color:#6b6a64;display:none"></span>
      <button id="btn-logout" class="btn btn-outline" style="display:none">Log ud</button>
      <a href="/" class="btn btn-outline">← Tilbage</a>
    </nav>
  </div>
</header>

<main class="container">

  <!-- Rediger besked modal -->
  <div id="edit-msg-modal" class="modal" style="display:none">
    <div class="modal-box">
      <h2>Rediger besked</h2>
      <input id="edit-msg-id" type="hidden">
      <div class="form-group">
        <label for="edit-msg-content">Besked</label>
        <input id="edit-msg-content" type="text">
      </div>
      <div class="modal-actions">
        <button id="btn-edit-msg-submit" class="btn btn-primary">Gem</button>
        <button id="btn-edit-msg-cancel" class="btn btn-outline">Annuller</button>
      </div>
    </div>
  </div>

  <section class="section">
    <div class="chat-page-header">
      <h1 id="chat-title" style="font-size:20px;font-weight:600">Indlæser chat…</h1>
      <span id="chat-meta" style="font-size:13px;color:#6b6a64"></span>
    </div>

    <div id="messages-container" class="messages-container">
      <p style="color:#6b6a64;font-size:14px">Indlæser beskeder…</p>
    </div>

    <div id="send-area" style="display:none" class="send-form">
      <input id="msg-input" type="text" placeholder="Skriv en besked…">
      <button id="btn-send" class="btn btn-primary">Send</button>
    </div>

    <p id="login-prompt" style="display:none;font-size:14px;color:#6b6a64;margin-top:12px">
      <a href="/" style="color:#2563eb">Log ind</a> for at sende beskeder.
    </p>
  </section>

</main>

<div id="toast" class="toast" style="display:none"></div>

<script>
// ── Utility ───────────────────────────────────────────────────────────────
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function api(method, url, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Noget gik galt');
  return data;
}

function formatDate(iso) {
  return new Date(iso).toLocaleString('da-DK', { dateStyle: 'short', timeStyle: 'short' });
}

// ── State ─────────────────────────────────────────────────────────────────
const params  = new URLSearchParams(location.search);
const chatId  = params.get('id');
let currentUser = null;

// ── Hent session-bruger ───────────────────────────────────────────────────
async function fetchCurrentUser() {
  try {
    const res = await fetch('/auth/me');
    if (res.ok) currentUser = await res.json();
  } catch (_) {}
}

// ── Render besked ─────────────────────────────────────────────────────────
function renderMessage(msg) {
  const isOwn = currentUser && msg.ownerId === currentUser.id;
  const canEdit = currentUser && (currentUser.level >= 3 || isOwn);

  const div = document.createElement('div');
  div.className = `message-item${isOwn ? ' own-message' : ''}`;
  div.dataset.id = msg.id;
  div.innerHTML = `
    <div class="message-header">
      <span class="message-author">${escapeHtml(msg.ownerName)}</span>
      <span>${formatDate(msg.createdAt)}</span>
    </div>
    <div class="message-content" id="content-${msg.id}">${escapeHtml(msg.content)}</div>
    ${canEdit ? `
    <div class="message-actions">
      <button class="btn btn-small btn-outline btn-edit-msg" data-id="${msg.id}" data-content="${escapeHtml(msg.content)}">Rediger</button>
      <button class="btn btn-small btn-danger btn-delete-msg" data-id="${msg.id}">Slet</button>
    </div>` : ''}
  `;
  return div;
}

// ── Indlæs chat ───────────────────────────────────────────────────────────
async function loadChat() {
  if (!chatId) {
    document.getElementById('chat-title').textContent = 'Ingen chat valgt';
    return;
  }

  try {
    const [chat, messages] = await Promise.all([
      api('GET', `/chats/${chatId}`),
      api('GET', `/chats/${chatId}/messages`)
    ]);

    document.title = chat.name + ' – ChatServer';
    document.getElementById('chat-title').textContent = chat.name;
    document.getElementById('chat-meta').textContent =
      `Oprettet af ${chat.ownerName} · ${formatDate(chat.createdAt)}`;

    const container = document.getElementById('messages-container');
    container.innerHTML = '';

    if (messages.length === 0) {
      container.innerHTML = '<p style="color:#6b6a64;font-size:14px">Ingen beskeder endnu. Vær den første!</p>';
    } else {
      messages.forEach(m => container.appendChild(renderMessage(m)));
      container.scrollTop = container.scrollHeight;
    }

    // Vis send-formular hvis logget ind med niveau 2+
    if (currentUser && currentUser.level >= 2) {
      document.getElementById('send-area').style.display = 'flex';
    } else if (!currentUser) {
      document.getElementById('login-prompt').style.display = 'block';
    }

  } catch (err) {
    document.getElementById('chat-title').textContent = 'Chat ikke fundet';
    showToast(err.message, 'error');
  }
}

// ── Send besked ───────────────────────────────────────────────────────────
document.getElementById('btn-send')?.addEventListener('click', async () => {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;

  try {
    const msg = await api('POST', `/chats/${chatId}/messages`, { content });
    const container = document.getElementById('messages-container');

    // Fjern "ingen beskeder" tekst
    const empty = container.querySelector('p');
    if (empty) empty.remove();

    container.appendChild(renderMessage(msg));
    container.scrollTop = container.scrollHeight;
    input.value = '';
  } catch (err) {
    showToast(err.message, 'error');
  }
});

document.getElementById('msg-input')?.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-send').click();
});

// ── Rediger besked ────────────────────────────────────────────────────────
document.getElementById('btn-edit-msg-cancel')?.addEventListener('click', () => {
  document.getElementById('edit-msg-modal').style.display = 'none';
});

document.getElementById('btn-edit-msg-submit')?.addEventListener('click', async () => {
  const id      = document.getElementById('edit-msg-id').value;
  const content = document.getElementById('edit-msg-content').value.trim();
  if (!content) return;

  try {
    const updated = await api('PUT', `/chats/${chatId}/messages/${id}`, { content });
    document.getElementById(`content-${id}`).textContent = updated.content;
    // Opdater data-content på rediger-knappen
    const btn = document.querySelector(`.btn-edit-msg[data-id="${id}"]`);
    if (btn) btn.dataset.content = updated.content;
    document.getElementById('edit-msg-modal').style.display = 'none';
    showToast('Besked opdateret');
  } catch (err) {
    showToast(err.message, 'error');
  }
});

// ── Slet besked ───────────────────────────────────────────────────────────
async function deleteMessage(id) {
  if (!confirm('Slet denne besked?')) return;
  try {
    await api('DELETE', `/chats/${chatId}/messages/${id}`);
    document.querySelector(`.message-item[data-id="${id}"]`)?.remove();
    showToast('Besked slettet');
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ── Event delegation ──────────────────────────────────────────────────────
document.addEventListener('click', e => {
  if (e.target.matches('.btn-edit-msg')) {
    document.getElementById('edit-msg-id').value = e.target.dataset.id;
    document.getElementById('edit-msg-content').value = e.target.dataset.content;
    document.getElementById('edit-msg-modal').style.display = 'flex';
    document.getElementById('edit-msg-content').focus();
  }
  if (e.target.matches('.btn-delete-msg')) {
    deleteMessage(e.target.dataset.id);
  }
});

// ── Logout ────────────────────────────────────────────────────────────────
document.getElementById('btn-logout')?.addEventListener('click', async () => {
  await api('POST', '/auth/logout');
  location.href = '/';
});

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  await fetchCurrentUser();

  if (currentUser) {
    const display = document.getElementById('user-display');
    display.textContent = `${currentUser.username} (niveau ${currentUser.level})`;
    display.style.display = 'inline';
    document.getElementById('btn-logout').style.display = 'inline-flex';
  }

  await loadChat();
})();
</script>
</body>
</html>
